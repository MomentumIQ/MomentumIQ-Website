collections:
  products:
    output: true
  teammembers:
    output: true

defaults:
  - scope:
      path: ""
      type: "teammembers"
    values:
      layout: "teammember"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
    values:
      layout: "default"

tagline: "Bringing Financial AI to Life"
sub_tagline: "We build AI-powered financial tools for consumers and professional investors — privacy-first, on-device, no cloud data storage."

team_description: "MomentumIQ is a small team of technologists from the Pacific Northwest (aka Cascadia). If you're interested in helping us get our products into the hands of users faster, <a href=\"mailto:contact@MomentumIQ.ai\">drop us a line</a>."

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag